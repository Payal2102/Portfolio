<!-- GitHub Pages initial deployment -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payal | Automation Console</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
<div class="terminal">
    <div class="terminal-header">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="title">payal@automation-console</span>
    </div>
 
    <div id="output">
        <p>Welcome to Payal's Automation Console 🚀</p>
        <p>Type <span class="command">help</span> to see available commands.</p>
    </div>
 
    <div class="input-line">
        <span class="prompt">➜</span>
        <input type="text" id="commandInput" autofocus placeholder="enter command..." />
    </div>
</div>
 
<script src="script.js"></script>
</body>
</html>
